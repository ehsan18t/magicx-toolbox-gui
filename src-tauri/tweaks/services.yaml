  - id: disable_program_compatibility
    name: "Disable Program Compatibility Assistant"
    description: "Disable Program Compatibility Assistant service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the Program Compatibility Assistant (PCA) service.

      ## What PCA Does
      - Detects known compatibility issues with older programs
      - Suggests compatibility modes after crashes
      - Monitors programs for potential problems

      ## When to Disable
      - You don't run legacy software
      - You want slightly faster program launches
      - You know how to set compatibility modes manually

      ## Recommendation
      Safe to disable. You can still right-click → Properties → Compatibility manually.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\PcaSvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\PcaSvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_distributed_link_tracking
    name: "Disable Distributed Link Tracking"
    description: "Disable Distributed Link Tracking Client service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables tracking of linked files across NTFS volumes.

      ## What Link Tracking Does
      - Maintains shortcuts to files even after they're moved
      - Updates links when files are relocated on network
      - Works with NTFS object identifiers

      ## Modern Relevance
      - Rarely needed in modern workflows
      - Most users never notice this feature
      - Mainly useful in enterprise environments

      ## Recommendation
      Safe to disable. Broken shortcuts can be recreated manually.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\TrkWks"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\TrkWks"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_homegroup_provider
    name: "Disable HomeGroup Services"
    description: "Disable HomeGroup Provider service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the HomeGroup Provider and Listener services.

      ## Important Note
      - **HomeGroup was removed in Windows 10 version 1803**
      - These services don't exist in Windows 10 1803+ or Windows 11
      - Only affects older Windows 10 builds

      ## What HomeGroup Was
      - Simple home network file/printer sharing
      - Replaced by standard SMB sharing and OneDrive

      ## Recommendation
      Safe to disable. The feature is deprecated and removed in modern Windows.
    options:
      - label: "Disabled"
        registry_missing_is_match: true
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\HomeGroupProvider"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
            windows_versions: [10]
            skip_validation: true
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\HomeGroupListener"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
            windows_versions: [10]
            skip_validation: true
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\HomeGroupProvider"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
            windows_versions: [10]
            skip_validation: true
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\HomeGroupListener"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
            windows_versions: [10]
            skip_validation: true

  # NOTE: disable_geolocation moved to privacy.yaml (location tracking related)

  - id: disable_retail_demo
    name: "Disable Retail Demo Service"
    description: "Disable Windows Retail Demo service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the RetailDemo service used for store display demos.

      ## What Retail Demo Does
      - Powers the demo mode on store display PCs
      - Resets device to demo state after idle
      - Shows promotional content

      ## Typical Systems
      - Only present on devices configured for retail display
      - Most consumer PCs don't have this service
      - Safe to skip if service doesn't exist

      ## Recommendation
      Safe to disable. No impact unless you're running a retail demo device.
    options:
      - label: "Disabled"
        registry_missing_is_match: true
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\RetailDemo"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
            skip_validation: true
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\RetailDemo"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
            skip_validation: true

  - id: disable_wallet_service
    name: "Disable Wallet Service"
    description: "Disable Windows Wallet Service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the WalletService used for NFC payment features.

      ## What Wallet Service Does
      - Manages NFC tap-to-pay functionality
      - Stores payment cards for contactless payments
      - Requires NFC-enabled hardware

      ## Availability
      - Not all Windows editions include this service
      - Requires compatible NFC hardware
      - Primarily for tablets and convertibles

      ## Recommendation
      Safe to disable unless you use NFC payments on your Windows device.
    options:
      - label: "Disabled"
        registry_missing_is_match: true
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WalletService"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
            skip_validation: true
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WalletService"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
            skip_validation: true

  # NOTE: disable_security_center_service moved to security.yaml

  - id: disable_touch_keyboard
    name: "Disable Touch Keyboard Service"
    description: "Disable Touch Keyboard and Handwriting Panel service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the TabletInputService for touch keyboard and handwriting.

      ## What Gets Disabled
      - On-screen touch keyboard
      - Handwriting input panel
      - Touch/pen text input features

      ## When to Disable
      - Desktop PC without touchscreen
      - Laptop without touch input
      - You never use on-screen keyboard

      ## Note
      Some emoji picker features may be affected.

      ## Recommendation
      Safe to disable on non-touchscreen devices.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\TabletInputService"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\TabletInputService"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  # NOTE: disable_cdpusersvc moved to privacy.yaml (activity sync/timeline)

  - id: disable_bits
    name: "Disable Background Intelligent Transfer"
    description: "Disable BITS (Background Intelligent Transfer Service)"
    risk_level: high
    requires_admin: true
    requires_reboot: true
    info: |
      ## ⚠️ WARNING: High Risk Tweak

      ## What This Does
      Disables BITS which manages background file transfers.

      ## Critical Dependency
      - **Windows Update requires BITS**
      - Microsoft Store downloads use BITS
      - Many enterprise tools depend on it

      ## What Breaks
      - Windows Update stops working
      - Store app downloads fail
      - Some third-party software updates

      ## Recommendation
      **Only disable if you manage updates manually.** Not recommended for most users.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\BITS"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\BITS"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_bluetooth_services
    name: "Disable Bluetooth Services"
    description: "Disable Bluetooth support services"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables Bluetooth support services. Only disable if you don't use any Bluetooth devices.

      ## Impact
      - All Bluetooth devices stop working (headphones, mice, keyboards)
      - Bluetooth settings disappear from Settings

      ## Recommendation
      Only disable if you never use Bluetooth. Keep enabled for wireless peripherals.
    options:
      - label: "Bluetooth Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\bthserv"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\BluetoothUserService"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
            skip_validation: true
        service_missing_is_match: true
      - label: "Bluetooth Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\bthserv"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\BluetoothUserService"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
            skip_validation: true

  - id: disable_alljoyn_router
    name: "Disable AllJoyn Router"
    description: "Disable the AllJoyn Router Service for IoT communication"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables AllJoyn Router Service which provides IoT device communication protocol.

      ## When to Disable
      - You don't use IoT/smart home devices that communicate via AllJoyn
      - Most consumer devices don't use this protocol

      ## Recommendation
      Safe to disable for nearly all users.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\AJRouter"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\AJRouter"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_phone_service
    name: "Disable Phone Service"
    description: "Disable Windows Phone Service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the Phone Service used for phone call management and Phone Link app.

      ## Impact
      - Phone Link (Your Phone) may not work
      - No phone call integration

      ## Recommendation
      Disable if you don't use Phone Link or phone-PC integration.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\PhoneSvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\PhoneSvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_ssdp_upnp
    name: "Disable SSDP/UPnP Discovery"
    description: "Disable network device discovery protocols"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables SSDP (Simple Service Discovery Protocol) and UPnP (Universal Plug and Play) services.

      ## Security Benefit
      - UPnP has known security vulnerabilities
      - Prevents automatic port forwarding by malware
      - Reduces network attack surface

      ## Impact
      - Smart home device discovery may stop
      - Some network devices may not be found automatically
      - Media streaming (DLNA) may be affected

      ## Recommendation
      Disable for security. Keep enabled if you use DLNA streaming or smart home devices.
    options:
      - label: "Discovery Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\SSDPSRV"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\upnphost"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Discovery Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\SSDPSRV"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\upnphost"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_windows_insider
    name: "Disable Windows Insider Service"
    description: "Disable Windows Insider Program service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the Windows Insider Service which manages Windows Insider preview builds.

      ## Recommendation
      Safe to disable unless you're enrolled in the Windows Insider Program.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\wisvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\wisvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_diagnostic_services
    name: "Disable Diagnostic Services"
    description: "Disable Windows diagnostic tracking services"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables multiple diagnostic-related services:
      - **DPS**: Diagnostic Policy Service (problem detection)
      - **WdiServiceHost**: Diagnostic Service Host
      - **WdiSystemHost**: Diagnostic System Host

      ## Impact
      - Windows troubleshooters may not work
      - Automatic problem detection disabled
      - Reduced background CPU and disk usage

      ## Recommendation
      Safe for experienced users who troubleshoot manually. Keep enabled if you rely on Windows diagnostics.
    options:
      - label: "Diagnostics Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\DPS"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WdiServiceHost"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WdiSystemHost"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Diagnostics Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\DPS"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WdiServiceHost"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WdiSystemHost"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 3

  - id: disable_maps_broker
    name: "Disable Maps Broker Service"
    description: "Disable the Downloaded Maps Manager service"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the Maps Broker service which manages offline map data.

      ## Impact
      - Offline maps features stop working
      - Maps app may require internet for all operations

      ## Recommendation
      Safe to disable if you don't use Windows Maps offline features.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\MapsBroker"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\MapsBroker"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2
