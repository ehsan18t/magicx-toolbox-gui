# Performance Tweaks - Optimize system performance and responsiveness

category:
  id: performance
  name: "Performance"
  description: "Optimize system speed and responsiveness"
  icon: "mdi:speedometer"
  order: 2

tweaks:
  - id: memory_prefetch_mode
    name: "Memory Prefetch Mode"
    description: "Configure Superfetch (SysMain) and Prefetch for your storage type"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Controls Windows memory preloading services that cache frequently-used data.

      ## Options Explained
      - **SSD Optimized**: Disables both Superfetch and Prefetch (recommended for SSD-only systems)
      - **Superfetch Only**: Disables Superfetch service but keeps file prefetching
      - **HDD Optimized**: Keeps both enabled (recommended for HDD or mixed storage)
      - **Custom (Prefetch Only)**: Disables Superfetch, enables Prefetch

      ## Superfetch vs Prefetch
      - **Superfetch (SysMain)**: Preloads frequently-used applications into RAM
      - **Prefetch**: Caches application data based on usage patterns

      ## When to Disable
      - **SSD users**: SSDs are fast enough that preloading provides minimal benefit
      - **High disk usage**: If you see constant 100% disk usage, try disabling
      - **Low RAM systems**: Preloading can use RAM needed by active applications

      ## Recommendation
      Use "SSD Optimized" for SSD-only systems. Use "HDD Optimized" if you have any HDDs.
    options:
      - label: "SSD Optimized (All Disabled)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\SysMain"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SessionManager\\Memory Management\\PrefetchParameters"
            value_name: "EnablePrefetcher"
            value_type: "REG_DWORD"
            value: 0
      - label: "Superfetch Only Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\SysMain"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SessionManager\\Memory Management\\PrefetchParameters"
            value_name: "EnablePrefetcher"
            value_type: "REG_DWORD"
            value: 3
      - label: "Prefetch Only Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\SysMain"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SessionManager\\Memory Management\\PrefetchParameters"
            value_name: "EnablePrefetcher"
            value_type: "REG_DWORD"
            value: 0
      - label: "HDD Optimized (All Enabled)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\SysMain"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SessionManager\\Memory Management\\PrefetchParameters"
            value_name: "EnablePrefetcher"
            value_type: "REG_DWORD"
            value: 3

  # NOTE: disable_superfetch, disable_prefetch consolidated into memory_prefetch_mode above

  - id: disable_search_indexing
    name: "Disable Windows Search Indexing"
    description: "Disable Windows Search indexing service"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the Windows Search indexing service which continuously indexes files for fast searching.

      ## Benefits
      - **Reduced disk I/O**: No background indexing activity
      - **Lower CPU usage**: Indexing can be CPU-intensive
      - **Better for SSDs**: Less unnecessary write activity

      ## Drawbacks
      - **Slow searches**: File searches will be much slower
      - **Start menu search**: Search results may be incomplete
      - **Outlook**: Email search will be affected

      ## Recommendation
      Only disable if you rarely use Windows Search. Consider using Everything search as an alternative.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WSearch"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WSearch"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2

  - id: disable_windows_tips
    name: "Disable Windows Tips"
    description: "Disable Windows Tips notifications"
    risk_level: low
    requires_reboot: false
    info: |
      ## What This Does
      Disables the "Get tips, tricks, and suggestions as you use Windows" feature.

      ## Benefits
      - No annoying popup tips
      - Slightly reduced background activity
      - Cleaner notification experience

      ## Recommendation
      Safe to disable for experienced users. New Windows users may find tips helpful.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
            value_name: "SoftLandingEnabled"
            value_type: "REG_DWORD"
            value: 0
      - label: "Enabled"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
            value_name: "SoftLandingEnabled"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_background_apps
    name: "Disable Background App Permissions"
    description: "Restrict background app permissions to improve performance"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Globally disables the ability for UWP/Store apps to run in the background.

      ## Benefits
      - **Better performance**: Fewer apps consuming resources
      - **Battery life**: Improved on laptops
      - **Privacy**: Apps can't collect data in background

      ## Drawbacks
      - **No notifications**: Apps won't receive push notifications
      - **Delayed updates**: Live tiles won't update
      - **Communication apps**: May miss messages in apps like WhatsApp

      ## Recommendation
      Enable selectively in Settings > Apps > Installed Apps > [App] > Advanced options.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications"
            value_name: "GlobalUserDisabled"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\AppPrivacy"
            value_name: "LetAppsRunInBackground"
            value_type: "REG_DWORD"
            value: 2
      - label: "Enabled"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications"
            value_name: "GlobalUserDisabled"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\AppPrivacy"
            value_name: "LetAppsRunInBackground"
            value_type: "REG_DWORD"
            value: 0

  - id: reduce_startup_delay
    name: "Reduce Startup Delay"
    description: "Reduce delay for startup apps to launch faster"
    risk_level: low
    requires_reboot: true
    info: |
      ## What This Does
      Reduces or eliminates the artificial delay Windows adds before launching startup applications.

      ## Technical Details
      Windows intentionally delays startup apps to prioritize system initialization. Default is typically 10 seconds.

      ## Benefits
      - Faster app availability after boot
      - Quicker time to productivity

      ## Potential Issues
      On slow systems, removing the delay might cause apps to compete with Windows for resources during boot.

      ## Recommendation
      Safe for SSD systems. Use with caution on older HDD systems.
    options:
      - label: "No Delay"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Serialize"
            value_name: "StartupDelayInMSec"
            value_type: "REG_DWORD"
            value: 0
      - label: "Default Delay"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Serialize"
            value_name: "StartupDelayInMSec"
            value_type: "REG_DWORD"
            value: 1000

  - id: ssd_optimize_trim
    name: "Enable SSD TRIM Optimization"
    description: "Enable TRIM command for SSD optimization"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      TRIM is a command that tells your SSD which data blocks are no longer in use and can be wiped internally.

      ## Benefits
      - **Maintains SSD speed**: Prevents write performance degradation over time
      - **Extends SSD lifespan**: More efficient wear leveling
      - **Better garbage collection**: SSD can optimize storage more effectively

      ## Technical Details
      When you delete files, Windows marks them as deleted but the SSD doesn't know. TRIM tells the SSD these blocks are free.

      ## Recommendation
      Should always be enabled on SSDs. Only disable for specific troubleshooting.
    options:
      - label: "TRIM Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "DisableDeleteNotification"
            value_type: "REG_DWORD"
            value: 0
      - label: "TRIM Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "DisableDeleteNotification"
            value_type: "REG_DWORD"
            value: 1

  - id: optimize_visual_effects
    name: "Optimize Visual Effects"
    description: "Disable unnecessary visual effects for better performance"
    risk_level: low
    requires_reboot: true
    info: |
      ## What This Does
      Configures Windows visual effects to prioritize performance over appearance.

      ## Performance Mode Disables
      - Window animations
      - Fade effects
      - Shadow effects
      - Smooth scrolling
      - Font smoothing (in some cases)

      ## Impact
      - **Older hardware**: Noticeable performance improvement
      - **Modern hardware**: Minimal difference, mostly cosmetic

      ## Recommendation
      Use Performance Mode on older systems or VMs. Modern systems can keep Best Appearance.
    options:
      - label: "Performance Mode"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects"
            value_name: "VisualFXSetting"
            value_type: "REG_DWORD"
            value: 2
      - label: "Best Appearance"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects"
            value_name: "VisualFXSetting"
            value_type: "REG_DWORD"
            value: 1

  - id: enable_large_system_cache
    name: "Enable Large System Cache"
    description: "Enable large system cache for improved performance (recommended for 8GB+ RAM)"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Configures Windows to use more RAM for file system caching, similar to server behavior.

      ## Benefits
      - Faster file operations
      - Reduced disk I/O
      - Better performance for file-intensive tasks

      ## Requirements
      - **Minimum 8GB RAM**: Below this, you may experience memory pressure
      - **16GB+ recommended**: Allows Windows to cache more data effectively

      ## Caution
      On low-RAM systems, this can cause applications to be swapped to disk, hurting performance.

      ## Recommendation
      Enable only on systems with 8GB+ RAM. Leave disabled on 4GB or less.
    options:
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SessionManager\\Memory Management"
            value_name: "LargeSystemCache"
            value_type: "REG_DWORD"
            value: 1
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SessionManager\\Memory Management"
            value_name: "LargeSystemCache"
            value_type: "REG_DWORD"
            value: 0

  - id: icon_cache_size
    name: "Icon Cache Size"
    description: "Adjust icon cache size for faster icon loading in File Explorer"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Increases the size of Windows' icon cache stored in memory.

      ## Benefits
      - **Faster folder loading**: Icons display immediately instead of loading
      - **Reduced disk I/O**: Fewer cache misses requiring disk reads
      - **Smoother experience**: Especially in folders with many files

      ## Size Options
      - **500KB (Default)**: Suitable for light users
      - **4MB**: Good for developers and power users
      - **8MB**: For users with large folders and many applications

      ## Recommendation
      4MB is a good balance. 8MB if you frequently work with folders containing hundreds of files.
    options:
      - label: "Default (500KB)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer"
            value_name: "Max Cached Icons"
            value_type: "REG_SZ"
            value: "500"
      - label: "4MB"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer"
            value_name: "Max Cached Icons"
            value_type: "REG_SZ"
            value: "4096"
      - label: "8MB"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer"
            value_name: "Max Cached Icons"
            value_type: "REG_SZ"
            value: "8192"

  - id: disable_autologger
    name: "Disable Diagnostic Autologger"
    description: "Disable DiagTrack autologger for reduced disk I/O and telemetry"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the DiagTrack autologger which records diagnostic data for Windows telemetry.

      ## Benefits
      - Reduced disk write activity
      - Less CPU usage from logging
      - Improved privacy (less telemetry data collected)

      ## What's Affected
      This only affects diagnostic logging, not core Windows functionality.

      ## Recommendation
      Safe to disable. This is a privacy and performance improvement with no downsides.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\ControlSet001\\Control\\WMI\\Autologger\\AutoLogger-Diagtrack-Listener"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "System\\ControlSet001\\Control\\WMI\\Autologger\\SQMLogger"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "System\\ControlSet001\\Control\\WMI\\Autologger\\CloudExperienceHostOobe"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 0
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\ControlSet001\\Control\\WMI\\Autologger\\AutoLogger-Diagtrack-Listener"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\ControlSet001\\Control\\WMI\\Autologger\\SQMLogger"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\ControlSet001\\Control\\WMI\\Autologger\\CloudExperienceHostOobe"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_map_auto_download
    name: "Disable Map Data Auto Download"
    description: "Prevent Windows from automatically downloading map data"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Prevents Windows Maps from automatically downloading map data in the background.

      ## Benefits
      - Saves bandwidth
      - Reduces background data usage
      - Less disk space used

      ## Impact
      - Maps app will need to download data on-demand
      - Offline maps won't be available unless manually downloaded

      ## Recommendation
      Safe to disable if you don't use Windows Maps. Keep enabled if you rely on offline navigation.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\Maps"
            value_name: "AutoDownloadAndUpdateMapData"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\Maps"
            value_name: "AllowUntriggeredNetworkTrafficOnSettingsPage"
            value_type: "REG_DWORD"
            value: 0
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\Maps"
            value_name: "AutoDownloadAndUpdateMapData"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\Maps"
            value_name: "AllowUntriggeredNetworkTrafficOnSettingsPage"
            value_type: "REG_DWORD"
            value: 1

  - id: enable_long_paths
    name: "Enable Long File Paths"
    description: "Enable support for file paths longer than 260 characters"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Removes the legacy 260 character limit on file paths in Windows.

      ## Why This Matters
      - **Development**: Node.js, npm, and many build tools create deep folder structures
      - **Gaming**: Some games have deeply nested file structures
      - **Cloud sync**: Files synced from other platforms may have long paths

      ## Compatibility
      - Modern applications support long paths
      - Some older applications may have issues (rare)
      - Windows 10 1607+ and Windows 11 supported

      ## Recommendation
      Safe to enable. Essential for developers and anyone using npm/node.
    options:
      - label: "Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "LongPathsEnabled"
            value_type: "REG_DWORD"
            value: 1
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "LongPathsEnabled"
            value_type: "REG_DWORD"
            value: 0

  - id: system_responsiveness
    name: "System Responsiveness Priority"
    description: "Adjust system resource allocation for foreground applications"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Controls the percentage of CPU resources reserved for background system tasks.

      ## Options Explained
      - **Gaming/Performance (0%)**: All resources prioritize foreground apps
      - **Balanced (20%)**: Default Windows behavior, reserves 20% for background tasks

      ## Gaming Impact
      Setting to 0% ensures games and active applications get maximum CPU priority.

      ## Stability Note
      Some background tasks may be delayed, but this rarely causes issues.

      ## Recommendation
      Use Gaming mode for gaming PCs. Use Balanced for general-purpose systems.
    options:
      - label: "Gaming/Performance (0%)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile"
            value_name: "SystemResponsiveness"
            value_type: "REG_DWORD"
            value: 0
      - label: "Balanced (20% - Default)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile"
            value_name: "SystemResponsiveness"
            value_type: "REG_DWORD"
            value: 20

  - id: enable_auto_end_tasks
    name: "Enable Auto End Hung Tasks"
    description: "Automatically end non-responding tasks during shutdown"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Automatically closes applications that stop responding during shutdown or logoff.

      ## Benefits
      - Faster shutdown times
      - No more "waiting for programs to close" dialogs
      - Smoother restart experience

      ## Potential Issue
      Unsaved work in hung applications will be lost. However, if an app is hung, you likely can't save anyway.

      ## Recommendation
      Safe to enable. Makes shutdown much smoother.
    options:
      - label: "Enabled"
        registry_changes:
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "AutoEndTasks"
            value_type: "REG_SZ"
            value: "1"
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "HungAppTimeout"
            value_type: "REG_SZ"
            value: "2000"
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "WaitToKillAppTimeout"
            value_type: "REG_SZ"
            value: "2000"
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control"
            value_name: "WaitToKillServiceTimeout"
            value_type: "REG_SZ"
            value: "2000"
      - label: "Disabled"
        registry_changes:
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "AutoEndTasks"
            value_type: "REG_SZ"
            value: "0"
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "HungAppTimeout"
            value_type: "REG_SZ"
            value: "5000"
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "WaitToKillAppTimeout"
            value_type: "REG_SZ"
            value: "20000"
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control"
            value_name: "WaitToKillServiceTimeout"
            value_type: "REG_SZ"
            value: "5000"

  - id: reduce_menu_show_delay
    name: "Reduce Menu Show Delay"
    description: "Reduce delay when opening menus for snappier UI"
    risk_level: low
    requires_reboot: false
    info: |
      ## What This Does
      Reduces the delay before menus appear when hovering over menu items.

      ## Default vs Fast
      - **Default (400ms)**: Noticeable pause before menus open
      - **Fast (100ms)**: Menus feel instant and responsive

      ## Benefits
      - More responsive user interface
      - Faster navigation through menus
      - Better overall desktop experience

      ## Recommendation
      100ms feels much snappier with no downsides. Highly recommended.
    options:
      - label: "Fast (100ms)"
        registry_changes:
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "MenuShowDelay"
            value_type: "REG_SZ"
            value: "100"
      - label: "Default (400ms)"
        registry_changes:
          - hive: HKCU
            key: "Control Panel\\Desktop"
            value_name: "MenuShowDelay"
            value_type: "REG_SZ"
            value: "400"

  - id: disable_ndu
    name: "Disable Network Data Usage Monitor"
    description: "Disable Windows Network Data Usage monitoring service"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables the Network Data Usage (NDU) driver which monitors network traffic for statistics.

      ## Benefits
      - Reduced background CPU usage
      - Less disk I/O from logging
      - Slightly lower memory usage

      ## What You Lose
      - Network usage statistics in Settings > Network & Internet
      - Data usage tracking per app

      ## Recommendation
      Safe to disable if you don't use Windows' built-in network usage tracking.
    options:
      - label: "Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\ControlSet001\\Services\\Ndu"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\ControlSet001\\Services\\Ndu"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2

  - id: ntfs_optimizations
    name: "NTFS Optimizations"
    description: "Optimize NTFS filesystem for SSDs and performance"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Applies three NTFS filesystem optimizations:
      - **Disable Last Access Timestamp**: Prevents updating the access time on every file read (reduces write overhead)
      - **Disable 8.3 Short Names**: Stops creating legacy DOS-compatible short filenames (reduces directory overhead)
      - **Increase NTFS Memory**: Allocates more memory for NTFS paged-pool operations

      ## Performance Impact
      - Significant reduction in unnecessary disk writes
      - Faster file creation and directory listing
      - Particularly beneficial for SSDs

      ## Compatibility
      - 8.3 names only needed by very old 16-bit DOS programs
      - Last access timestamps rarely used by modern software
      - Safe for all modern Windows installations

      ## Recommendation
      Strongly recommended for SSD systems. Safe for HDD systems too.
    options:
      - label: "NTFS Optimized"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "NtfsDisableLastAccessUpdate"
            value_type: "REG_DWORD"
            value: 2147483649
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "NtfsDisable8dot3NameCreation"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "NtfsMemoryUsage"
            value_type: "REG_DWORD"
            value: 2
      - label: "NTFS Default"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "NtfsDisableLastAccessUpdate"
            value_type: "REG_DWORD"
            value: 2147483651
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "NtfsDisable8dot3NameCreation"
            value_type: "REG_DWORD"
            value: 2
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\FileSystem"
            value_name: "NtfsMemoryUsage"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_paging_executive
    name: "Keep Kernel in RAM"
    description: "Prevent Windows kernel from being paged to disk"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Keeps kernel-mode drivers and system code in physical RAM instead of allowing them to be paged to the swap file.

      ## Performance Impact
      - Faster system calls and kernel operations
      - Eliminates page faults for kernel code
      - Uses more physical RAM for system code

      ## Requirements
      - Recommended for systems with 8GB+ RAM
      - Not recommended for systems with less than 4GB RAM

      ## Recommendation
      Enable on modern systems with adequate RAM (8GB+).
    options:
      - label: "Kernel Locked in RAM"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "DisablePagingExecutive"
            value_type: "REG_DWORD"
            value: 1
      - label: "Kernel Pageable (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "DisablePagingExecutive"
            value_type: "REG_DWORD"
            value: 0

  - id: process_scheduling
    name: "Process Scheduling Priority"
    description: "Configure CPU scheduling for foreground applications"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Controls how Windows allocates CPU time between foreground and background processes via the Win32PrioritySeparation value.

      ## Options Explained
      - **Desktop Responsive**: Short variable quanta with maximum foreground boost (value 38/0x26). Best for desktop responsiveness.
      - **Gaming Optimized**: Short variable quanta with high foreground boost (value 22/0x16). Reduces context switching.
      - **Server Balanced**: Long fixed quanta with minimal boost (value 24/0x18). Equal time for all processes.
      - **Windows Default**: Default scheduling (value 2). Long variable quanta.

      ## How It Works
      The value encodes: [Quantum Length 2bit][Quantum Type 2bit][Foreground Boost 2bit]
      - Quantum Length: Short (reduces latency) vs Long (reduces overhead)
      - Quantum Type: Fixed vs Variable
      - Foreground Boost: How much extra CPU time foreground apps get

      ## Recommendation
      "Desktop Responsive" for general use, "Gaming Optimized" for gaming.
    options:
      - label: "Desktop Responsive"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\PriorityControl"
            value_name: "Win32PrioritySeparation"
            value_type: "REG_DWORD"
            value: 38
      - label: "Gaming Optimized"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\PriorityControl"
            value_name: "Win32PrioritySeparation"
            value_type: "REG_DWORD"
            value: 22
      - label: "Server Balanced"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\PriorityControl"
            value_name: "Win32PrioritySeparation"
            value_type: "REG_DWORD"
            value: 24
      - label: "Windows Default"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\PriorityControl"
            value_name: "Win32PrioritySeparation"
            value_type: "REG_DWORD"
            value: 2

  - id: disable_vbs_hvci
    name: "Disable VBS / Core Isolation"
    description: "Disable Virtualization Based Security and Core Isolation"
    risk_level: critical
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables Virtualization Based Security (VBS) and Hypervisor-enforced Code Integrity (HVCI), also known as "Core Isolation / Memory Integrity" in Windows Security.

      ## Performance Impact
      - **5-25% FPS improvement** in games (documented by Tom's Hardware, TechPowerUp)
      - Significant CPU overhead reduction for all workloads
      - Win11 24H2 enables this by default on new installs

      ## Security Trade-off
      - Reduces protection against kernel-level exploits
      - Credential Guard may be affected
      - Less isolation between user/kernel mode

      ## Recommendation
      Disable for gaming/performance PCs. Keep enabled on work machines handling sensitive data.
    options:
      - label: "VBS/HVCI Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\DeviceGuard"
            value_name: "EnableVirtualizationBasedSecurity"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity"
            value_name: "Enabled"
            value_type: "REG_DWORD"
            value: 0
      - label: "VBS/HVCI Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\DeviceGuard"
            value_name: "EnableVirtualizationBasedSecurity"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity"
            value_name: "Enabled"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_spectre_meltdown
    name: "Disable Spectre/Meltdown Mitigations"
    description: "Disable CPU vulnerability mitigations for maximum performance"
    risk_level: critical
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables software mitigations for Spectre V2 and Meltdown CPU vulnerabilities.

      ## Performance Impact
      - **5-30% improvement** on I/O-heavy and syscall-heavy workloads
      - Database, compilation, and file operations see largest gains
      - Gaming improvement varies (0-10%)

      ## Security Risk
      - Exposes system to Spectre/Meltdown side-channel attacks
      - Only safe on air-gapped or trusted networks
      - Modern CPUs (12th gen+) have hardware mitigations making this less impactful

      ## Recommendation
      Only disable on dedicated gaming/benchmark machines. Never on internet-facing servers.
    options:
      - label: "Mitigations Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "FeatureSettingsOverride"
            value_type: "REG_DWORD"
            value: 3
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "FeatureSettingsOverrideMask"
            value_type: "REG_DWORD"
            value: 3
      - label: "Mitigations Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "FeatureSettingsOverride"
            action: delete_value
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "FeatureSettingsOverrideMask"
            action: delete_value

  - id: disable_storage_sense
    name: "Disable Storage Sense"
    description: "Disable automatic disk cleanup by Storage Sense"
    risk_level: low
    requires_reboot: false
    info: |
      ## What This Does
      Disables Storage Sense which automatically deletes temporary files, empties recycle bin, and removes old downloads.

      ## Why Disable
      - Prevents unexpected file deletion
      - You control when cleanup happens
      - Avoids accidental removal of needed temp files

      ## Recommendation
      Disable if you prefer manual disk cleanup control. Keep enabled on low-storage devices.
    options:
      - label: "Storage Sense Disabled"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\StorageSense\\Parameters\\StoragePolicy"
            value_name: "01"
            value_type: "REG_DWORD"
            value: 0
      - label: "Storage Sense Enabled (Default)"
        registry_changes:
          - hive: HKCU
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\StorageSense\\Parameters\\StoragePolicy"
            value_name: "01"
            value_type: "REG_DWORD"
            value: 1

  - id: font_cache_size
    name: "Increase Font Cache"
    description: "Increase font cache size for faster text rendering"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Doubles the font cache from 4MB to 8MB, reducing font rendering delays.

      ## Performance Impact
      - Faster text rendering in applications with many fonts
      - Reduces font cache misses
      - Minimal memory overhead (4MB additional)

      ## Recommendation
      Safe to enable on all systems. Especially beneficial for design applications.
    options:
      - label: "8MB Font Cache"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows NT\\CurrentVersion\\Font Management"
            value_name: "Font Cache Max Size"
            value_type: "REG_DWORD"
            value: 8
      - label: "4MB Font Cache (Default)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows NT\\CurrentVersion\\Font Management"
            value_name: "Font Cache Max Size"
            value_type: "REG_DWORD"
            value: 4

  - id: clear_page_file_shutdown
    name: "Clear Page File at Shutdown"
    description: "Clear the virtual memory page file when shutting down"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Overwrites the page file (pagefile.sys) with zeros during shutdown to prevent sensitive data from being recovered.

      ## Security Benefit
      - Passwords and encryption keys in memory cannot be recovered from page file
      - Protects against offline attacks on the disk

      ## Trade-off
      - Shutdown takes longer (proportional to page file size)
      - No impact on startup or runtime performance

      ## Recommendation
      Enable for security-sensitive systems. Skip if fast shutdown is a priority.
    options:
      - label: "Clear at Shutdown"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "ClearPageFileAtShutdown"
            value_type: "REG_DWORD"
            value: 1
      - label: "Don't Clear (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "ClearPageFileAtShutdown"
            value_type: "REG_DWORD"
            value: 0

  - id: io_page_lock_limit
    name: "I/O Page Lock Limit"
    description: "Configure maximum memory for I/O operations"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Controls how much RAM can be locked for I/O operations. Higher values allow more concurrent I/O.

      ## Options Explained
      - **2MB (16GB+ RAM)**: Maximum I/O throughput for high-memory systems
      - **960KB (8GB+ RAM)**: Good balance for most modern systems
      - **Auto (Default)**: Windows manages automatically

      ## Recommendation
      Use "960KB" for 8-16GB systems, "2MB" for 16GB+. Leave "Auto" if unsure.
    options:
      - label: "2MB (16GB+ RAM)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "IoPageLockLimit"
            value_type: "REG_DWORD"
            value: 2097152
      - label: "960KB (8GB+ RAM)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "IoPageLockLimit"
            value_type: "REG_DWORD"
            value: 983040
      - label: "Auto (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
            value_name: "IoPageLockLimit"
            value_type: "REG_DWORD"
            value: 0

  - id: delivery_optimization_cache
    name: "Limit Delivery Optimization Cache"
    description: "Minimize disk space used by Windows Update cache"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Limits the Delivery Optimization cache which stores Windows Update files for potential sharing.

      ## Benefits
      - Frees disk space used by cached update files
      - Prevents stale update files from accumulating
      - Works alongside P2P delivery settings

      ## Recommendation
      Safe to enable. Update files are re-downloaded when needed.
    options:
      - label: "Cache Minimized"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\DeliveryOptimization"
            value_name: "DOMaxCacheSize"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\DeliveryOptimization"
            value_name: "DOMaxCacheAge"
            value_type: "REG_DWORD"
            value: 0
      - label: "Cache Default (20% Disk)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\DeliveryOptimization"
            value_name: "DOMaxCacheSize"
            value_type: "REG_DWORD"
            value: 20
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\DeliveryOptimization"
            value_name: "DOMaxCacheAge"
            value_type: "REG_DWORD"
            value: 259200
