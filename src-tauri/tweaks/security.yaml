# Security Tweaks - Improve Windows security settings

category:
  id: security
  name: "Security"
  description: "Improve Windows security settings"
  icon: "mdi:security"
  order: 4

tweaks:
  - id: disable_remote_registry
    name: "Disable Remote Registry"
    description: "Disable Remote Registry service to prevent remote access"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables the Remote Registry service which allows remote computers to modify your registry.

      ## Security Benefits
      - Prevents remote registry manipulation attacks
      - Blocks potential malware from remotely modifying system settings
      - Reduces attack surface for network-based exploits

      ## Recommendation
      Always disable unless you specifically need remote registry access for IT management.
    options:
      - label: "Remote Registry Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\RemoteRegistry"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Remote Registry Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\RemoteRegistry"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2

  - id: disable_remote_desktop
    name: "Disable Remote Desktop"
    description: "Disable Remote Desktop Protocol (RDP) access"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables Remote Desktop Protocol (RDP) which allows remote access to your computer.

      ## Security Impact
      - **When enabled**: Anyone with credentials can access your PC remotely
      - **When disabled**: Remote access via RDP is blocked

      ## When to Keep Enabled
      - If you use Remote Desktop to access this PC from elsewhere
      - IT-managed environments that require remote support

      ## Recommendation
      Disable if you don't use Remote Desktop. RDP is a common attack vector.
    options:
      - label: "Remote Desktop Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server"
            value_name: "fDenyTSConnections"
            value_type: "REG_DWORD"
            value: 1
      - label: "Remote Desktop Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server"
            value_name: "fDenyTSConnections"
            value_type: "REG_DWORD"
            value: 0

  - id: removable_media_behavior
    name: "Removable Media Behavior"
    description: "Configure AutoPlay and AutoRun for removable drives"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Controls how Windows handles removable media like USB drives and CDs/DVDs.

      ## Options Explained
      - **Maximum Security**: Disables both AutoPlay and AutoRun scripts (recommended)
      - **AutoRun Only Disabled**: AutoPlay works but scripts don't execute
      - **AutoPlay Only Disabled**: AutoPlay is off but AutoRun can execute (not recommended)
      - **All Enabled**: Original Windows behavior (insecure)

      ## Security Risks
      - **AutoPlay**: Automatically runs programs when media is inserted
      - **AutoRun (autorun.inf)**: Scripts on drives can execute automatically
      - USB drives with malware can infect systems instantly with these enabled

      ## Recommendation
      Always use "Maximum Security". There's no legitimate reason to keep these enabled.
    options:
      - label: "Maximum Security (All Disabled)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoDriveTypeAutoRun"
            value_type: "REG_DWORD"
            value: 255
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoAutorun"
            value_type: "REG_DWORD"
            value: 1
      - label: "AutoRun Only Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoDriveTypeAutoRun"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoAutorun"
            value_type: "REG_DWORD"
            value: 1
      - label: "AutoPlay Only Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoDriveTypeAutoRun"
            value_type: "REG_DWORD"
            value: 255
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoAutorun"
            value_type: "REG_DWORD"
            value: 0
      - label: "All Enabled (Insecure)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoDriveTypeAutoRun"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
            value_name: "NoAutorun"
            value_type: "REG_DWORD"
            value: 0

  # NOTE: disable_autoplay, disable_autorun consolidated into removable_media_behavior above

  - id: require_ctrlaltdel
    name: "Require Ctrl+Alt+Del to Unlock"
    description: "Require pressing Ctrl+Alt+Del for security screen"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Requires pressing Ctrl+Alt+Del before the login screen appears.

      ## Security Purpose
      - Ctrl+Alt+Del cannot be simulated by software
      - Protects against fake login screen attacks (credential theft)
      - Ensures you're interacting with the real Windows login

      ## Inconvenience Factor
      One extra key combination at login - minor inconvenience for added security.

      ## Recommendation
      Enable for security-conscious users and business environments.
    options:
      - label: "Ctrl+Alt+Del Required"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "DisableCAD"
            value_type: "REG_DWORD"
            value: 0
      - label: "Ctrl+Alt+Del Not Required"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "DisableCAD"
            value_type: "REG_DWORD"
            value: 1

  # NOTE: Guest account management removed - requires special SAM registry handling
  # Use 'net user Guest /active:no' command instead

  - id: disable_smbv1
    name: "Disable SMBv1 Protocol"
    description: "Disable legacy SMBv1 network protocol"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables the legacy SMBv1 file sharing protocol.

      ## Security Risks of SMBv1
      - **WannaCry ransomware** exploited SMBv1 vulnerabilities
      - No encryption of data in transit
      - Weak authentication mechanisms
      - Multiple known unpatched vulnerabilities

      ## Compatibility
      - Windows Vista and later don't need SMBv1
      - Very old NAS devices might require it
      - Windows XP file sharing requires it

      ## Recommendation
      Disable unless you have legacy devices that require it. SMBv2/v3 are secure.
    options:
      - label: "SMBv1 Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "SMB1"
            value_type: "REG_DWORD"
            value: 0
      - label: "SMBv1 Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "SMB1"
            value_type: "REG_DWORD"
            value: 1

  - id: enforce_password_policy
    name: "Enforce Strong Password Policy"
    description: "Enforce strong password requirements"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Requires signing or sealing for network authentication, ensuring encrypted and signed communication.

      ## Security Benefits
      - Prevents man-in-the-middle attacks on network authentication
      - Ensures password hashes aren't sent in clear text
      - Protects against credential interception

      ## Compatibility
      - Works with all modern Windows systems
      - May break very old network clients

      ## Recommendation
      Enable for improved network authentication security.
    options:
      - label: "Strong Password Policy Enforced"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\Netlogon\\Parameters"
            value_name: "RequireSignOrSeal"
            value_type: "REG_DWORD"
            value: 1
      - label: "Standard Password Policy"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\Netlogon\\Parameters"
            value_name: "RequireSignOrSeal"
            value_type: "REG_DWORD"
            value: 0

  - id: disable_smartscreen
    name: "Disable SmartScreen"
    description: "Disable Windows SmartScreen filter"
    risk_level: high
    requires_admin: true
    requires_reboot: false
    info: |
      ## ⚠️ WARNING: High Risk Tweak

      ## What This Does
      Disables Windows SmartScreen which checks downloaded files and apps against Microsoft's database of known malware.

      ## Security Impact
      - **No warning** for potentially malicious downloads
      - **No protection** against known malware
      - **Bypasses** Microsoft's threat intelligence

      ## Why Someone Would Disable It
      - Privacy concerns about files being checked against Microsoft servers
      - False positives blocking legitimate software
      - Running custom/unsigned software frequently

      ## Recommendation
      **Keep enabled unless you have a specific reason to disable it.** This significantly reduces your protection against malware.
    options:
      - label: "SmartScreen Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\System"
            value_name: "EnableSmartScreen"
            value_type: "REG_DWORD"
            value: 0
      - label: "SmartScreen Enabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\System"
            value_name: "EnableSmartScreen"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_defender_sample_submit
    name: "Disable Defender Sample Submission"
    description: "Prevent Windows Defender from automatically sending sample files to Microsoft"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Prevents Windows Defender from automatically uploading suspicious files to Microsoft for analysis.

      ## Privacy Considerations
      - Files flagged as suspicious are uploaded to Microsoft's cloud
      - Could include sensitive documents if flagged incorrectly
      - Helps Microsoft improve threat detection

      ## Security Trade-off
      - Disabling reduces your contribution to threat intelligence
      - Your system still receives protection updates
      - Manual submission is still possible

      ## Recommendation
      Disable if privacy is a major concern. The security impact is minimal.
    options:
      - label: "Sample Submission Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows Defender\\Spynet"
            value_name: "SubmitSamplesConsent"
            value_type: "REG_DWORD"
            value: 2
      - label: "Sample Submission Enabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows Defender\\Spynet"
            value_name: "SubmitSamplesConsent"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_defender_malware_report
    name: "Disable Defender Malware Reporting"
    description: "Disable automatic malware reporting to Microsoft"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Prevents the Malicious Software Removal Tool from reporting infection data to Microsoft.

      ## Privacy Benefits
      - No telemetry about infections sent to Microsoft
      - Infection history stays local

      ## Trade-off
      - Doesn't affect your protection level
      - Only affects reporting of what was found

      ## Recommendation
      Safe to disable for privacy. Your protection remains unchanged.
    options:
      - label: "Malware Reporting Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\MRT"
            value_name: "DontReportInfectionInformation"
            value_type: "REG_DWORD"
            value: 1
      - label: "Malware Reporting Enabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\MRT"
            value_name: "DontReportInfectionInformation"
            value_type: "REG_DWORD"
            value: 0

  - id: disable_wpbt
    name: "Disable Windows Platform Binary Table"
    description: "Disable WPBT which allows vendors to force-install software at boot"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables the Windows Platform Binary Table (WPBT) - a UEFI feature that allows computer manufacturers to automatically install software at boot.

      ## Security Concerns
      - WPBT runs code from UEFI firmware
      - Manufacturers have used it to install bloatware
      - Lenovo used it for persistent software installation
      - Potential vector for rootkit-like persistence

      ## What This Blocks
      - Vendor software that reinstalls after fresh Windows install
      - "Persistent" manufacturer tools embedded in firmware

      ## Recommendation
      Safe to disable. Prevents unwanted manufacturer software from persisting.
    options:
      - label: "WPBT Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager"
            value_name: "DisableWpbtExecution"
            value_type: "REG_DWORD"
            value: 1
      - label: "WPBT Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Session Manager"
            value_name: "DisableWpbtExecution"
            action: delete_value

  - id: set_utc_time
    name: "Set Hardware Clock to UTC (Dual Boot)"
    description: "Set Windows to use UTC time for dual-boot with Linux"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Configures Windows to treat the hardware clock as UTC time instead of local time.

      ## Why This Matters (Dual Boot)
      - Linux stores UTC in hardware clock, Windows stores local time
      - Results in time being wrong after switching OS
      - Time jumps back/forward by timezone offset

      ## Impact
      - Fixes time synchronization issues between Windows and Linux
      - Windows will now correctly interpret hardware clock

      ## Recommendation
      Essential for dual-boot with Linux. No reason to enable for single-boot systems.
    options:
      - label: "UTC (For Dual Boot)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\TimeZoneInformation"
            value_name: "RealTimeIsUniversal"
            value_type: "REG_DWORD"
            value: 1
      - label: "Local Time (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\TimeZoneInformation"
            value_name: "RealTimeIsUniversal"
            value_type: "REG_DWORD"
            value: 0

  - id: block_third_party_drivers
    name: "Block Third-Party Driver Installs"
    description: "Block automatic installation of third-party drivers from Windows Update"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Prevents Windows Update from automatically installing third-party driver software and co-installers.

      ## What Gets Blocked
      - Razer Synapse auto-installation
      - Corsair iCUE auto-installation
      - Logitech G Hub auto-installation
      - Other vendor bloatware that comes with drivers

      ## What Still Works
      - Basic device functionality (hardware still works)
      - Microsoft's built-in drivers
      - Manually installed drivers

      ## Recommendation
      Enable if you prefer to manually install peripheral software. Reduces bloatware.
    options:
      - label: "Third-Party Drivers Blocked"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\DriverSearching"
            value_name: "SearchOrderConfig"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Device Installer"
            value_name: "DisableCoInstallers"
            value_type: "REG_DWORD"
            value: 1
      - label: "Third-Party Drivers Allowed (Default)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\DriverSearching"
            value_name: "SearchOrderConfig"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Device Installer"
            value_name: "DisableCoInstallers"
            value_type: "REG_DWORD"
            value: 0

  - id: disable_windows_error_reporting_service
    name: "Disable Windows Error Reporting"
    description: "Disable Windows Error Reporting completely"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables Windows Error Reporting which sends crash data and error reports to Microsoft.

      ## Privacy Benefits
      - No crash dumps sent to Microsoft
      - Application error data stays local
      - Reduced telemetry

      ## What You Lose
      - Microsoft won't receive data to fix issues
      - Some apps rely on WER for crash recovery

      ## Recommendation
      Safe to disable for privacy. Crash reports rarely benefit individual users.
    options:
      - label: "Error Reporting Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\Windows Error Reporting"
            value_name: "Disabled"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WerSvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\Windows Error Reporting"
            value_name: "DontSendAdditionalData"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\Windows Error Reporting"
            value_name: "LoggingDisabled"
            value_type: "REG_DWORD"
            value: 1
      - label: "Error Reporting Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\Windows Error Reporting"
            value_name: "Disabled"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\WerSvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\Windows Error Reporting"
            value_name: "DontSendAdditionalData"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\Windows Error Reporting"
            value_name: "LoggingDisabled"
            value_type: "REG_DWORD"
            value: 0

  - id: disable_lmhash_storage
    name: "Disable LM Hash Storage"
    description: "Prevent storage of LAN Manager hash for passwords"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Prevents Windows from storing LAN Manager (LM) password hashes.

      ## Security Issue with LM Hashes
      - LM hashes use weak DES encryption
      - Can be cracked in seconds with modern hardware
      - Only needed for Windows 9x/ME compatibility

      ## Modern Windows
      - Uses NTLM or Kerberos instead
      - LM hashes are a legacy liability
      - No modern software requires them

      ## Recommendation
      Always disable. LM hashes are a significant security vulnerability.
    options:
      - label: "LM Hash Storage Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "NoLMHash"
            value_type: "REG_DWORD"
            value: 1
      - label: "LM Hash Storage Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "NoLMHash"
            value_type: "REG_DWORD"
            value: 0

  - id: disable_anonymous_enum
    name: "Disable Anonymous SAM Enumeration"
    description: "Prevent anonymous enumeration of SAM accounts"
    risk_level: low
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Prevents unauthenticated users from enumerating user accounts and shares.

      ## Attack Scenario
      Without this, attackers can:
      - List all user accounts without credentials
      - Identify valid usernames for brute force attacks
      - Enumerate network shares

      ## Impact
      - Blocks reconnaissance phase of attacks
      - No impact on normal operations
      - May break very old network applications

      ## Recommendation
      Enable for improved security. Standard security hardening practice.
    options:
      - label: "Anonymous Enumeration Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "RestrictAnonymousSAM"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "RestrictAnonymous"
            value_type: "REG_DWORD"
            value: 1
      - label: "Anonymous Enumeration Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "RestrictAnonymousSAM"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "RestrictAnonymous"
            value_type: "REG_DWORD"
            value: 0

  - id: disable_admin_shares
    name: "Disable Administrative Shares"
    description: "Disable automatic creation of administrative shares (C$, ADMIN$)"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Disables the automatic creation of hidden administrative shares (C$, D$, ADMIN$, IPC$).

      ## Security Risk of Admin Shares
      - Accessible to anyone with admin credentials
      - Common target for lateral movement in attacks
      - Used by ransomware to spread across networks

      ## What Breaks
      - Some remote administration tools
      - Certain backup software
      - Network-based system management

      ## Recommendation
      Enable on personal computers. Consider impact carefully in managed environments.
    options:
      - label: "Admin Shares Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "AutoShareWks"
            value_type: "REG_DWORD"
            value: 0
      - label: "Admin Shares Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "AutoShareWks"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_security_center_service
    name: "Disable Windows Security Center"
    description: "Disable Windows Security Center service (wscsvc)"
    risk_level: high
    requires_admin: true
    requires_reboot: false
    info: |
      ## ⚠️ WARNING: High Risk Tweak

      ## What This Does
      Disables the Windows Security Center service which monitors your security status.

      ## Security Impact
      - **No security alerts**: You won't be notified of disabled firewall, antivirus issues
      - **No status monitoring**: Security app won't show overall security health
      - **Third-party AV**: May interfere with some antivirus software

      ## Why Someone Would Disable It
      - Using alternative security monitoring
      - Reducing background services for specific use cases
      - Running in a controlled environment

      ## Recommendation
      **Keep enabled unless you have a specific reason.** This significantly reduces security visibility.
    options:
      - label: "Security Center Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\wscsvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 4
      - label: "Security Center Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\wscsvc"
            value_name: "Start"
            value_type: "REG_DWORD"
            value: 2

  - id: smb_signing
    name: "Enforce SMB Signing"
    description: "Require digital signing for SMB network traffic"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Enforces SMB (Server Message Block) signing on both client and server connections. SMB signing ensures data integrity and prevents man-in-the-middle attacks on file sharing.

      ## Security Benefit
      - Prevents SMB relay attacks
      - Ensures file sharing data integrity
      - Required by many security compliance frameworks (CIS, STIG)

      ## Performance Impact
      - Minor CPU overhead for signing operations (~5-10%)
      - Negligible on modern hardware

      ## Recommendation
      Enable for security. Minor performance impact is worth the protection.
    options:
      - label: "SMB Signing Required"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "RequireSecuritySignature"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "EnableSecuritySignature"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanWorkstation\\Parameters"
            value_name: "RequireSecuritySignature"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanWorkstation\\Parameters"
            value_name: "EnableSecuritySignature"
            value_type: "REG_DWORD"
            value: 1
      - label: "SMB Signing Default"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "RequireSecuritySignature"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanServer\\Parameters"
            value_name: "EnableSecuritySignature"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanWorkstation\\Parameters"
            value_name: "RequireSecuritySignature"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\LanmanWorkstation\\Parameters"
            value_name: "EnableSecuritySignature"
            value_type: "REG_DWORD"
            value: 1

  - id: uac_level
    name: "UAC Security Level"
    description: "Configure User Account Control prompt behavior"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Controls how User Account Control (UAC) prompts behave for administrators and standard users.

      ## Options Explained
      - **Maximum Security**: Always prompt on secure desktop, auto-deny for standard users, filter built-in admin token
      - **Standard (Default)**: Prompt for elevation on secure desktop for non-Windows binaries
      - **Minimal Prompts**: Prompt without secure desktop (less secure but less intrusive)

      ## Recommendation
      "Maximum Security" for best protection. "Standard" for typical use.
    options:
      - label: "Maximum Security"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "ConsentPromptBehaviorAdmin"
            value_type: "REG_DWORD"
            value: 2
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "ConsentPromptBehaviorUser"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "PromptOnSecureDesktop"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "FilterAdministratorToken"
            value_type: "REG_DWORD"
            value: 1
      - label: "Standard (Default)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "ConsentPromptBehaviorAdmin"
            value_type: "REG_DWORD"
            value: 5
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "ConsentPromptBehaviorUser"
            value_type: "REG_DWORD"
            value: 3
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "PromptOnSecureDesktop"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "FilterAdministratorToken"
            value_type: "REG_DWORD"
            value: 0
      - label: "Minimal Prompts"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "ConsentPromptBehaviorAdmin"
            value_type: "REG_DWORD"
            value: 5
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "ConsentPromptBehaviorUser"
            value_type: "REG_DWORD"
            value: 3
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "PromptOnSecureDesktop"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
            value_name: "FilterAdministratorToken"
            value_type: "REG_DWORD"
            value: 0

  - id: powershell_security
    name: "PowerShell Security Logging"
    description: "Enable PowerShell script block and module logging"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Enables comprehensive PowerShell logging to detect malicious scripts.

      ## What Gets Logged
      - **Script Block Logging**: Logs the content of all PowerShell scripts that execute
      - **Module Logging**: Logs PowerShell module usage

      ## Security Benefit
      - Detect obfuscated malware scripts
      - Forensic evidence of attacks
      - Compliance with security frameworks

      ## Recommendation
      Enable for security. Logs stored in Windows Event Viewer.
    options:
      - label: "Logging Enabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\PowerShell\\ScriptBlockLogging"
            value_name: "EnableScriptBlockLogging"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\PowerShell\\ModuleLogging"
            value_name: "EnableModuleLogging"
            value_type: "REG_DWORD"
            value: 1
      - label: "Logging Disabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\PowerShell\\ScriptBlockLogging"
            value_name: "EnableScriptBlockLogging"
            value_type: "REG_DWORD"
            value: 0
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows\\PowerShell\\ModuleLogging"
            value_name: "EnableModuleLogging"
            value_type: "REG_DWORD"
            value: 0

  - id: disable_llmnr
    name: "Disable LLMNR"
    description: "Disable Link-Local Multicast Name Resolution"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables LLMNR (Link-Local Multicast Name Resolution), a protocol that resolves hostnames on local networks when DNS fails.

      ## Security Risk of LLMNR
      - LLMNR responds to ANY name query on the network
      - Attackers can respond with fake addresses (LLMNR poisoning)
      - Used in credential theft attacks (Responder, MITM)
      - One of the most common Windows network attack vectors

      ## Recommendation
      Always disable. DNS should handle name resolution. LLMNR is a significant security risk.
    options:
      - label: "LLMNR Disabled"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows NT\\DNSClient"
            value_name: "EnableMulticast"
            value_type: "REG_DWORD"
            value: 0
      - label: "LLMNR Enabled (Default)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Policies\\Microsoft\\Windows NT\\DNSClient"
            value_name: "EnableMulticast"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_netbios
    name: "Disable NetBIOS over TCP/IP"
    description: "Disable NetBIOS name resolution for security"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Changes the NetBIOS node type to P-node (point-to-point only), effectively disabling NetBIOS broadcast name resolution.

      ## Security Risk of NetBIOS
      - NetBIOS broadcasts are vulnerable to spoofing
      - Used alongside LLMNR in credential theft attacks
      - Exposes computer names to the network

      ## Compatibility
      - Very old applications may require NetBIOS
      - Modern networks use DNS exclusively
      - May affect old printer/file sharing configurations

      ## Recommendation
      Disable alongside LLMNR for comprehensive protection against name resolution attacks.
    options:
      - label: "NetBIOS Disabled (P-Node)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\NetBT\\Parameters"
            value_name: "NodeType"
            value_type: "REG_DWORD"
            value: 2
      - label: "NetBIOS Default (B-Node)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Services\\NetBT\\Parameters"
            value_name: "NodeType"
            value_type: "REG_DWORD"
            value: 1

  - id: disable_wdigest
    name: "Disable WDigest Authentication"
    description: "Prevent cleartext password storage in memory"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Disables WDigest authentication which stores plaintext passwords in memory. This is exploited by tools like Mimikatz to extract credentials.

      ## Security Impact
      - Passwords no longer stored in cleartext in LSASS memory
      - Attackers with admin access cannot extract plain passwords
      - Already disabled by default on Win10/11 but explicitly ensures it

      ## Recommendation
      Always ensure this is disabled. Critical security hardening.
    options:
      - label: "WDigest Disabled (Secure)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SecurityProviders\\WDigest"
            value_name: "UseLogonCredential"
            value_type: "REG_DWORD"
            value: 0
      - label: "WDigest Enabled (Insecure)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\SecurityProviders\\WDigest"
            value_name: "UseLogonCredential"
            value_type: "REG_DWORD"
            value: 1

  - id: reduce_credential_caching
    name: "Reduce Credential Caching"
    description: "Reduce cached domain logon credentials"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Reduces the number of cached domain logon credentials from 10 to 1. Cached logons allow signing in when the domain controller is unreachable.

      ## Security Benefit
      - Fewer credentials stored locally to steal
      - Reduces attack surface for offline credential attacks
      - CIS Benchmark recommendation

      ## Impact
      - Only 1 previous logon cached (instead of 10)
      - If domain controller is unreachable, only the last user can log in
      - No impact on local accounts

      ## Recommendation
      Set to 1 for security. Only relevant for domain-joined machines.
    options:
      - label: "Minimal Caching (1)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon"
            value_name: "CachedLogonsCount"
            value_type: "REG_SZ"
            value: "1"
      - label: "Default Caching (10)"
        registry_changes:
          - hive: HKLM
            key: "Software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon"
            value_name: "CachedLogonsCount"
            value_type: "REG_SZ"
            value: "10"

  - id: enable_lsa_protection
    name: "Enable LSA Protection"
    description: "Run Local Security Authority as Protected Process"
    risk_level: medium
    requires_admin: true
    requires_reboot: true
    info: |
      ## What This Does
      Enables LSA (Local Security Authority) protection by running LSASS as a Protected Process Light (PPL). This prevents unauthorized access to credential material.

      ## Security Benefit
      - Blocks credential dumping tools (Mimikatz, etc.)
      - Prevents injection of malicious code into LSASS
      - Required by many security compliance frameworks

      ## Compatibility
      - May block some older security software
      - Enabled by default on Windows 11 24H2
      - Legacy drivers may need updating

      ## Recommendation
      Enable on all systems. Essential protection against credential theft.
    options:
      - label: "LSA Protection Enabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "RunAsPPL"
            value_type: "REG_DWORD"
            value: 1
      - label: "LSA Protection Disabled"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "RunAsPPL"
            value_type: "REG_DWORD"
            value: 0

  - id: enforce_ntlmv2
    name: "Enforce NTLMv2 Only"
    description: "Only allow NTLMv2 authentication, refuse LM and NTLMv1"
    risk_level: medium
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Configures Windows to only use NTLMv2 for NTLM authentication and refuse LM/NTLMv1 responses.

      ## Security Benefit
      - LM and NTLMv1 have known cryptographic weaknesses
      - Prevents downgrade attacks to weaker protocols
      - CIS Benchmark Level 1 requirement

      ## Compatibility
      - Very old systems (Windows 98/NT4 without patches) cannot connect
      - All modern Windows systems support NTLMv2
      - Safe for any network with Windows Vista or newer

      ## Recommendation
      Always enforce NTLMv2. No legitimate reason to allow LM/NTLMv1 on modern networks.
    options:
      - label: "NTLMv2 Only (Level 5)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "LmCompatibilityLevel"
            value_type: "REG_DWORD"
            value: 5
      - label: "Default (Level 3)"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Lsa"
            value_name: "LmCompatibilityLevel"
            value_type: "REG_DWORD"
            value: 3

  - id: rdp_security_hardening
    name: "Harden RDP Security"
    description: "Enforce NLA and TLS encryption for Remote Desktop"
    risk_level: low
    requires_admin: true
    requires_reboot: false
    info: |
      ## What This Does
      Hardens Remote Desktop Protocol security:
      - **NLA Required**: Network Level Authentication must complete before session is established
      - **TLS Security Layer**: Uses TLS instead of legacy RDP encryption
      - **High Encryption**: Requires 128-bit encryption

      ## Security Benefit
      - Prevents credential exposure before authentication
      - Protects against RDP man-in-the-middle attacks
      - Blocks connections from very old RDP clients

      ## Recommendation
      Enable if RDP is used. These are best-practice settings.
    options:
      - label: "RDP Hardened"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
            value_name: "UserAuthentication"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
            value_name: "SecurityLayer"
            value_type: "REG_DWORD"
            value: 2
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
            value_name: "MinEncryptionLevel"
            value_type: "REG_DWORD"
            value: 3
      - label: "RDP Default"
        registry_changes:
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
            value_name: "UserAuthentication"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
            value_name: "SecurityLayer"
            value_type: "REG_DWORD"
            value: 1
          - hive: HKLM
            key: "System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
            value_name: "MinEncryptionLevel"
            value_type: "REG_DWORD"
            value: 1
